services:
  db:
    image: postgres:15
    container_name: postgres_lotes_db
    restart: unless-stopped
    # O Docker Compose busca automaticamente o arquivo .env na mesma pasta
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: