name: LotePIM CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verificar padronização dos Commits (Commitlint)
        uses: wagoid/commitlint-github-action@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      # --- SETUP BACKEND ---
      - name: Instalar dependências (Backend)
        working-directory: ./backend
        run: npm ci --legacy-peer-deps

      - name: Build de Produção (Backend)
        working-directory: ./backend
        run: npm run build

      - name: Testes Unitários (Backend)
        working-directory: ./backend
        run: npm run test

      - name: Testes de Integração com Testcontainers (Backend)
        working-directory: ./backend
        run: npm run test:integration

      # --- SETUP FRONTEND ---
      - name: Instalar dependências (Frontend)
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Build de Produção (Frontend)
        working-directory: ./frontend
        run: npm run build

      - name: Testes Unitários e de Componente (Frontend)
        working-directory: ./frontend
        run: npm run test
