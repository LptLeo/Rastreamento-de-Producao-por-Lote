<div class="flex items-center justify-between px-4 py-3 sm:px-6 bg-[#0A0A0A] border border-[#484847]/30 rounded-lg mt-6">
  <div class="flex flex-1 justify-between sm:hidden">
    <button (click)="prevPage()" [disabled]="meta.paginaAtual === 1"
      class="relative inline-flex items-center rounded-md border border-[#484847]/60 bg-[#131313] px-4 py-2 text-xs font-bold text-[#ADAAAA] hover:bg-[#1a1a1a] disabled:opacity-30 disabled:cursor-not-allowed transition-all uppercase tracking-wider">
      Anterior
    </button>
    <button (click)="nextPage()" [disabled]="meta.paginaAtual === meta.totalPaginas"
      class="relative ml-3 inline-flex items-center rounded-md border border-[#484847]/60 bg-[#131313] px-4 py-2 text-xs font-bold text-[#ADAAAA] hover:bg-[#1a1a1a] disabled:opacity-30 disabled:cursor-not-allowed transition-all uppercase tracking-wider">
      Próxima
    </button>
  </div>
  <div class="hidden sm:flex sm:flex-1 sm:items-center sm:justify-between">
    <div>
      <p class="text-[11px] text-[#6B7280] uppercase tracking-wider">
        Mostrando <span class="font-bold text-white">{{ (meta.paginaAtual - 1) * meta.itensPorPagina + 1 }}</span> a
        <span class="font-bold text-white">{{ Math.min(meta.paginaAtual * meta.itensPorPagina, meta.totalItens) }}</span> de
        <span class="font-bold text-white">{{ meta.totalItens }}</span> resultados
      </p>
    </div>
    <div>
      <nav class="isolate inline-flex -space-x-px rounded-md shadow-sm" aria-label="Pagination">
        <!-- Anterior -->
        <button (click)="prevPage()" [disabled]="meta.paginaAtual === 1"
          class="relative inline-flex items-center rounded-l-md px-2 py-2 text-[#6B7280] ring-1 ring-inset ring-[#484847]/60 hover:bg-[#1a1a1a] focus:z-20 focus:outline-offset-0 disabled:opacity-30 disabled:cursor-not-allowed transition-all">
          <span class="sr-only">Anterior</span>
          <svg class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M12.79 5.23a.75.75 0 01-.02 1.06L8.832 10l3.938 3.71a.75.75 0 11-1.04 1.08l-4.5-4.25a.75.75 0 010-1.08l4.5-4.25a.75.75 0 011.06.02z" clip-rule="evenodd" />
          </svg>
        </button>

        @for (page of pages(); track $index) {
          @if (page === '...') {
            <span class="relative inline-flex items-center px-4 py-2 text-xs font-semibold text-[#484847] ring-1 ring-inset ring-[#484847]/60 focus:outline-offset-0">...</span>
          } @else {
            <button (click)="onPageClick(page)"
              [class.bg-[#00E5FF]]="page === meta.paginaAtual"
              [class.text-black]="page === meta.paginaAtual"
              [class.font-bold]="page === meta.paginaAtual"
              [class.text-[#ADAAAA]]="page !== meta.paginaAtual"
              [class.ring-1]="true"
              [class.ring-inset]="true"
              [class.ring-[#484847]/60]="page !== meta.paginaAtual"
              class="relative inline-flex items-center px-4 py-2 text-xs focus:z-20 focus:outline-offset-0 hover:bg-[#1a1a1a] transition-all">
              {{ page }}
            </button>
          }
        }

        <!-- Próxima -->
        <button (click)="nextPage()" [disabled]="meta.paginaAtual === meta.totalPaginas"
          class="relative inline-flex items-center rounded-r-md px-2 py-2 text-[#6B7280] ring-1 ring-inset ring-[#484847]/60 hover:bg-[#1a1a1a] focus:z-20 focus:outline-offset-0 disabled:opacity-30 disabled:cursor-not-allowed transition-all">
          <span class="sr-only">Próxima</span>
          <svg class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z" clip-rule="evenodd" />
          </svg>
        </button>
      </nav>
    </div>
  </div>
</div>
