<div class="flex flex-col gap-2">
  <label class="text-[10px] font-bold tracking-[1.5px] uppercase text-[#6B7280]">{{ label }}</label>
  <div class="relative group">
    <select
      [formControl]="control"
      class="w-full bg-[#0E0E0E] border rounded pl-4 pr-10 py-2.5 text-sm text-white focus:outline-none transition-colors appearance-none cursor-pointer"
      [class.border-[#dc2626]]="showError()"
      [class.border-[#484847]/80]="!showError()"
      [class.focus:border-[#dc2626]]="showError()"
      [class.focus:border-[#00E5FF]]="!showError()"
    >
      <option value="" disabled>{{ placeholder }}</option>
      @for (option of options; track option.value) {
        <option [value]="option.value">{{ option.label }}</option>
      }
    </select>
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
      class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-[#ADAAAA] pointer-events-none">
      <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
    </svg>
  </div>
  @if (showError()) {
    <span class="text-[11px] text-[#fca5a5]">{{ errorMessage }}</span>
  }
</div>
