<div class="flex flex-col gap-2">
  <div class="flex items-center justify-between gap-3">
    <label class="text-[10px] font-bold tracking-[1.5px] uppercase text-[#6B7280]">{{ label }}</label>
    @if (showGenerator) {
      <button
        type="button"
        (click)="generatePassword()"
        class="text-[11px] text-[#00E5FF] hover:text-[#81ECFF] transition-colors"
      >
        {{ generatorLabel }}
      </button>
    }
  </div>
  <div class="relative">
    <input
      [type]="visible ? 'text' : 'password'"
      [formControl]="control"
      class="w-full bg-[#0E0E0E] border rounded px-4 py-2.5 pr-14 text-sm text-white focus:outline-none transition-colors"
      [class.border-[#dc2626]]="showError()"
      [class.border-[#484847]/80]="!showError()"
      [class.focus:border-[#dc2626]]="showError()"
      [class.focus:border-[#00E5FF]]="!showError()"
    />
    <button
      type="button"
      (click)="toggleVisibility()"
      class="absolute right-3 top-1/2 -translate-y-1/2 text-[11px] text-[#ADAAAA] hover:text-white transition-colors"
    >
      {{ visible ? 'Ocultar' : 'Ver' }}
    </button>
  </div>
  @if (showError()) {
    <span class="text-[11px] text-[#fca5a5]">{{ errorMessage }}</span>
  }
</div>
