@if (toastService.toast(); as toast) {
  <div class="fixed top-20 right-4 z-[70] max-w-sm w-full animate-fade-in-up">
    <div
      class="flex flex-col gap-3 rounded-md border p-4 shadow-lg bg-[#131313]"
      [class.border-[#00E5FF]/40]="toast.type === 'success'"
      [class.border-[#dc2626]/40]="toast.type === 'error'"
      [class.border-yellow-500/40]="toast.type === 'warning'"
    >
      <div class="flex items-start justify-between gap-3">
        <p
          class="text-[13px] leading-relaxed"
          [class.text-[#81ECFF]]="toast.type === 'success'"
          [class.text-[#fca5a5]]="toast.type === 'error'"
          [class.text-yellow-200]="toast.type === 'warning'"
        >
          {{ toast.message }}
        </p>
        <button
          type="button"
          (click)="toastService.close()"
          class="text-xs text-[#ADAAAA] hover:text-white transition-colors shrink-0"
        >
          Fechar
        </button>
      </div>

      @if (toast.actions && toast.actions.length > 0) {
        <div class="flex justify-end gap-2 mt-1">
          @for (action of toast.actions; track action.label) {
            <button
              (click)="action.callback()"
              class="px-3 py-1.5 rounded text-[10px] font-bold uppercase tracking-wider transition-all"
              [class.bg-yellow-500]="action.primary"
              [class.text-black]="action.primary"
              [class.bg-[#1a1a1a]]="!action.primary"
              [class.text-[#ADAAAA]]="!action.primary"
              [class.hover:text-white]="!action.primary"
            >
              {{ action.label }}
            </button>
          }
        </div>
      }
    </div>
  </div>
}
