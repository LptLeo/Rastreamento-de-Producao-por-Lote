<aside class="flex flex-row justify-around items-center min-h-16 w-full bg-[#0E0E0E] border-t border-[#484847]/30 md:flex-col md:justify-start md:items-stretch md:min-h-screen md:w-auto md:border-t-0">
  <div class="hidden px-6 py-8 lg:block">
    <h3 class="text-2xl font-bold leading-8 tracking-[-1.2px] text-[#00E5FF]">LOTE PIM</h3>
    <span class="text-[10.4px] leading-[15.6px] tracking-[0.52px] text-[#ADAAAA]">VERSION 1.0.0</span>
  </div>
  <nav class="flex flex-row justify-around w-full p-2 mb-0 md:flex-col md:justify-start md:w-auto md:p-4 md:mb-auto">
    <button routerLink="/app/dashboard" routerLinkActive="is-active"
      class="relative group flex justify-center items-center w-full px-4 py-3 rounded-lg cursor-pointer text-[#ADAAAA] hover:bg-[#ADAAAA]/5 md:rounded-none lg:justify-start transition-all overflow-hidden">
      <!-- Indicador lateral animado -->
      <div class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-0 bg-[#00E5FF] transition-all duration-300 group-hover:h-full group-[.is-active]:h-full shadow-[0_0_10px_#00E5FF]"></div>
      
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
        class="size-6 min-w-[24px] min-h-[24px] lg:mr-4 transition-colors group-[.is-active]:text-[#00E5FF]">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z" />
      </svg>
      <span class="hidden text-[14px] leading-[20px] tracking-[1.4px] lg:block transition-all group-[.is-active]:font-bold group-[.is-active]:text-[#00E5FF]">
        DASHBOARD
      </span>
    </button>
    <button routerLink="/app/lote" routerLinkActive="is-active"
      class="relative group flex justify-center items-center w-full px-4 py-3 rounded-lg cursor-pointer text-[#ADAAAA] hover:bg-[#ADAAAA]/5 md:rounded-none lg:justify-start transition-all overflow-hidden">
      <!-- Indicador lateral animado -->
      <div class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-0 bg-[#00E5FF] transition-all duration-300 group-hover:h-full group-[.is-active]:h-full shadow-[0_0_10px_#00E5FF]"></div>

      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
        class="size-6 min-w-[24px] min-h-[24px] lg:mr-4 transition-colors group-[.is-active]:text-[#00E5FF]">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="m20.25 7.5-.625 10.632a2.25 2.25 0 0 1-2.247 2.118H6.622a2.25 2.25 0 0 1-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z" />
      </svg>
      <span class="hidden text-[14px] leading-[20px] tracking-[1.4px] lg:block transition-all group-[.is-active]:font-bold group-[.is-active]:text-[#00E5FF]">LOTE</span>
    </button>
    
    @if (authService.usuario()?.perfil === 'gestor') {
      <button routerLink="/app/produtos" routerLinkActive="is-active"
        class="relative group flex justify-center items-center w-full px-4 py-3 rounded-lg cursor-pointer text-[#ADAAAA] hover:bg-[#ADAAAA]/5 md:rounded-none lg:justify-start transition-all overflow-hidden">
        <!-- Indicador lateral animado -->
        <div class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-0 bg-[#00E5FF] transition-all duration-300 group-hover:h-full group-[.is-active]:h-full shadow-[0_0_10px_#00E5FF]"></div>

        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
          class="size-6 min-w-[24px] min-h-[24px] lg:mr-4 transition-colors group-[.is-active]:text-[#00E5FF]">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="m21 7.5-9-5.25L3 7.5m18 0-9 5.25m9-5.25v9l-9 5.25M3 7.5l9 5.25M3 7.5v9l9 5.25m0-9v9" />
        </svg>
        <span class="hidden text-[14px] leading-[20px] tracking-[1.4px] lg:block transition-all group-[.is-active]:font-bold group-[.is-active]:text-[#00E5FF]">PRODUTOS</span>
      </button>

      <button routerLink="/app/insumos" routerLinkActive="is-active"
        class="relative group flex justify-center items-center w-full px-4 py-3 rounded-lg cursor-pointer text-[#ADAAAA] hover:bg-[#ADAAAA]/5 md:rounded-none lg:justify-start transition-all overflow-hidden">
        <!-- Indicador lateral animado -->
        <div class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-0 bg-[#00E5FF] transition-all duration-300 group-hover:h-full group-[.is-active]:h-full shadow-[0_0_10px_#00E5FF]"></div>

        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
          class="size-6 min-w-[24px] min-h-[24px] lg:mr-4 transition-colors group-[.is-active]:text-[#00E5FF]">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M20.25 7.5-.625 10.632a2.25 2.25 0 0 1-2.247 2.118H6.622a2.25 2.25 0 0 1-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z" />
        </svg>
        <span class="hidden text-[14px] leading-[20px] tracking-[1.4px] lg:block transition-all group-[.is-active]:font-bold group-[.is-active]:text-[#00E5FF]">INSUMOS</span>
      </button>
    }
    <button routerLink="/app/rastreabilidade" routerLinkActive="is-active"
      class="relative group flex justify-center items-center w-full px-4 py-3 rounded-lg cursor-pointer text-[#ADAAAA] hover:bg-[#ADAAAA]/5 md:rounded-none lg:justify-start transition-all overflow-hidden">
      <!-- Indicador lateral animado -->
      <div class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-0 bg-[#00E5FF] transition-all duration-300 group-hover:h-full group-[.is-active]:h-full shadow-[0_0_10px_#00E5FF]"></div>

      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
        class="size-6 min-w-[24px] min-h-[24px] lg:mr-4 transition-colors group-[.is-active]:text-[#00E5FF]">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 21a9.004 9.004 0 0 0 8.716-6.747M12 21a9.004 9.004 0 0 1-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 0 1 7.843 4.582M12 3a8.997 8.997 0 0 0-7.843 4.582m15.686 0A11.953 11.953 0 0 1 12 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0 1 21 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0 1 12 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 0 1 3 12c0-1.605.42-3.113 1.157-4.418" />
      </svg>
      <span class="hidden text-[14px] leading-[20px] tracking-[1.4px] lg:block transition-all group-[.is-active]:font-bold group-[.is-active]:text-[#00E5FF]">RASTREABILIDADE</span>
    </button>
    <button routerLink="/app/configuracoes" routerLinkActive="is-active"
      class="relative group flex justify-center items-center w-full px-4 py-3 rounded-lg cursor-pointer text-[#ADAAAA] hover:bg-[#ADAAAA]/5 md:rounded-none lg:justify-start transition-all overflow-hidden">
      <!-- Indicador lateral animado -->
      <div class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-0 bg-[#00E5FF] transition-all duration-300 group-hover:h-full group-[.is-active]:h-full shadow-[0_0_10px_#00E5FF]"></div>

      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
        class="size-6 min-w-[24px] min-h-[24px] lg:mr-4 transition-colors group-[.is-active]:text-[#00E5FF]">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
      </svg>
      <span class="hidden text-[14px] leading-[20px] tracking-[1.4px] lg:block transition-all group-[.is-active]:font-bold group-[.is-active]:text-[#00E5FF]">CONFIGURAÇÕES</span>
    </button>
  </nav>
  <div class="hidden items-center pr-6 p-6 border-t border-[#484847]/10 md:flex">
    <button
      (click)="logout()"
      class="relative group flex justify-center items-center w-full px-4 py-3 rounded-lg cursor-pointer hover:bg-red-500/5 md:rounded-none lg:justify-start transition-all overflow-hidden">
      
      <!-- Indicador lateral vermelho para Logout -->
      <div class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-0 bg-red-500 transition-all duration-300 group-hover:h-full shadow-[0_0_10px_rgba(239,68,68,0.5)]"></div>

      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#ADAAAA"
        class="size-6 min-w-[24px] min-h-[24px] lg:mr-4 transition-colors group-hover:stroke-red-500">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
      </svg>

      <span class="hidden lg:block text-[12px] leading-[18px] tracking-[0.6px] text-[#ADAAAA] transition-colors group-hover:text-red-500 group-hover:font-bold">SAIR</span>
    </button>
  </div>
</aside>
