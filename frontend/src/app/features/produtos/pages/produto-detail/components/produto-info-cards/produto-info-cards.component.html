<div class="grid grid-cols-2 md:grid-cols-4 gap-3">
  <div class="bg-[#1A1919] border border-[#484847]/40 rounded-md p-4 flex flex-col gap-1">
    <span class="text-[10px] font-bold tracking-[1.5px] uppercase text-[#6B7280]">Categoria</span>
    <span class="text-[14px] text-white">{{ produto.categoria }}</span>
  </div>
  <div class="bg-[#1A1919] border border-[#484847]/40 rounded-md p-4 flex flex-col gap-1">
    <span class="text-[10px] font-bold tracking-[1.5px] uppercase text-[#6B7280]">Linha Padrão</span>
    <span class="text-[14px] text-white">{{ produto.linha_padrao }}</span>
  </div>
  <div class="bg-[#1A1919] border border-[#484847]/40 rounded-md p-4 flex flex-col gap-1">
    <span class="text-[10px] font-bold tracking-[1.5px] uppercase text-[#6B7280]">Tolerância (Ressalva)</span>
    <span class="text-[14px] text-[#00E5FF] font-bold">{{ produto.percentual_ressalva }}%</span>
  </div>
  <div class="bg-[#1A1919] border border-[#484847]/40 rounded-md p-4 flex flex-col gap-1">
    <span class="text-[10px] font-bold tracking-[1.5px] uppercase text-[#6B7280]">ID Interno</span>
    <span class="text-[14px] text-[#ADAAAA]">#{{ produto.id }}</span>
  </div>
</div>
