<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
  <div class="flex flex-col bg-[#131313] p-5 rounded-lg border border-[#484847]/30">
    <span class="text-[#ADAAAA] text-[10px] uppercase font-bold tracking-[1.5px] mb-2">Total de Lotes</span>
    <div class="flex items-baseline gap-2">
      <span class="text-2xl font-bold text-white">{{ totalRegistros }}</span>
      <span class="text-[#ADAAAA] text-[9px] uppercase font-bold">Lotes</span>
    </div>
  </div>
  <div class="flex flex-col bg-[#131313] p-5 rounded-lg border border-[#484847]/30">
    <span class="text-[#ADAAAA] text-[10px] uppercase font-bold tracking-[1.5px] mb-2">Com Saldo</span>
    <div class="flex items-baseline gap-2">
      <span class="text-2xl font-bold text-[#00E5FF]">{{ totalComSaldo }}</span>
      <span class="text-[#ADAAAA] text-[9px] uppercase font-bold">Lotes</span>
    </div>
  </div>
  <div class="flex flex-col bg-[#131313] p-5 rounded-lg border border-[#484847]/30">
    <span class="text-[#ADAAAA] text-[10px] uppercase font-bold tracking-[1.5px] mb-2">Esgotados</span>
    <div class="flex items-baseline gap-2">
      <span class="text-2xl font-bold text-[#dc2626]">{{ totalEsgotados }}</span>
      <span class="text-[#ADAAAA] text-[9px] uppercase font-bold">Lotes</span>
    </div>
  </div>
</div>
