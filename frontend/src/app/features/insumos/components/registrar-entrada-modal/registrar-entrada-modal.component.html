@if (isOpen) {
<div class="fixed inset-0 z-50 flex justify-end bg-black/60 backdrop-blur-sm transition-opacity">
  <div
    class="w-full max-w-lg bg-[#0A0A0A] h-full border-l border-[#484847]/40 shadow-2xl flex flex-col animate-slide-in-right">

    <!-- Modal Header -->
    <div class="flex items-center justify-between px-6 py-5 border-b border-[#484847]/40 bg-[#131313]">
      <div>
        <h2 class="text-lg font-bold text-white tracking-tight">Registrar Entrada</h2>
        <span class="text-[10px] uppercase font-bold tracking-[1.5px] text-[#6B7280]">Novo Lote no Estoque Físico</span>
      </div>
      <button (click)="onClose()"
        class="w-8 h-8 flex items-center justify-center rounded-full bg-[#1A1A1A] border border-[#484847]/40 text-[#ADAAAA] hover:text-white hover:bg-red-900/20 hover:border-red-500/50 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
          class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Modal Body -->
    <div class="flex-1 overflow-y-auto p-6">
      @if (erro) {
      <div class="bg-red-950/20 border border-[#dc2626]/40 p-4 rounded-md mb-6">
        <p class="text-[#fca5a5] text-[12px] font-semibold whitespace-pre-line">{{ erro }}</p>
      </div>
      }

      <form [formGroup]="formEstoque" class="flex flex-col gap-6">

        <div class="flex flex-col gap-2">
          <label class="text-[10px] font-bold tracking-[1.5px] uppercase text-[#6B7280]">Matéria-Prima *</label>
          <div class="relative">
            <select formControlName="materia_prima_id" (change)="resetQuantidade()"
              class="w-full bg-[#131313] border border-[#484847]/80 rounded pl-4 pr-10 py-2.5 text-sm text-white focus:outline-none focus:border-[#00E5FF] appearance-none cursor-pointer transition-colors">
              <option [ngValue]="null" disabled>Selecione...</option>
              @for (mp of catalogo; track mp.id) {
              <option [value]="mp.id">{{ mp.nome }} ({{ mp.sku_interno }})</option>
              }
            </select>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
              stroke="currentColor"
              class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-white pointer-events-none">
              <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
            </svg>
          </div>
        </div>

        <div class="grid grid-cols-1 min-[425px]:grid-cols-2 gap-4">
          <div class="flex flex-col gap-2">
            <label class="text-[10px] font-bold tracking-[1.5px] uppercase text-[#6B7280]">Lote do Fornecedor *</label>
            <input type="text" formControlName="numero_lote_fornecedor" placeholder="Ex: LOTE-ABC"
              class="w-full bg-[#131313] border border-[#484847]/80 rounded px-4 py-2.5 text-sm text-white focus:outline-none focus:border-[#00E5FF] transition-colors">
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-[10px] font-bold tracking-[1.5px] uppercase text-[#6B7280]">Fornecedor *</label>
            <input type="text" formControlName="fornecedor" placeholder="Ex: Samsung"
              class="w-full bg-[#131313] border border-[#484847]/80 rounded px-4 py-2.5 text-sm text-white focus:outline-none focus:border-[#00E5FF] transition-colors">
          </div>
        </div>

        <div class="grid grid-cols-1 min-[425px]:grid-cols-2 gap-4">
          <div class="flex flex-col gap-2">
            <label class="text-[10px] font-bold tracking-[1.5px] uppercase text-[#6B7280]">Quantidade Inicial *</label>
            <div class="flex">
              <input type="number" formControlName="quantidade_inicial" placeholder="0" min="0"
                [attr.step]="unidadeSelecionada() === 'UN' ? '1' : '0.01'"
                (keydown)="unidadeSelecionada() === 'UN' ? ($event.key === '.' || $event.key === ',' ? $event.preventDefault() : null) : null"
                class="w-full bg-[#131313] border border-[#484847]/80 rounded-l px-4 py-2.5 text-sm text-white focus:outline-none focus:border-[#00E5FF] transition-colors">
              <span
                class="flex items-center justify-center bg-[#1A1A1A] border border-l-0 border-[#484847]/80 px-3 rounded-r text-[#ADAAAA] text-xs font-bold">{{
                unidadeSelecionada() }}</span>
            </div>
          </div>

          <div class="flex flex-col gap-2">
            <label class="text-[10px] font-bold tracking-[1.5px] uppercase text-[#6B7280]">Turno de Recebimento
              *</label>
            <div class="relative">
              <select formControlName="turno"
                class="w-full bg-[#131313] border border-[#484847]/80 rounded pl-4 pr-10 py-2.5 text-sm text-white focus:outline-none focus:border-[#00E5FF] appearance-none cursor-pointer transition-colors">
                <option value="manha">Manhã</option>
                <option value="tarde">Tarde</option>
                <option value="noite">Noite</option>
              </select>
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                stroke="currentColor"
                class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-white pointer-events-none">
                <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
              </svg>
            </div>
          </div>
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-[10px] font-bold tracking-[1.5px] uppercase text-[#6B7280]">Data de Validade</label>
          <div class="flex flex-col gap-3">
            <div class="relative h-[42px] cursor-pointer"
              [class.opacity-50]="formEstoque.controls.naoAplicaValidade.value"
              [class.pointer-events-none]="formEstoque.controls.naoAplicaValidade.value"
              (click)="!formEstoque.controls.naoAplicaValidade.value && datePickerValidade.showPicker()">
              <div class="w-full h-full bg-[#131313] border border-[#484847]/80 rounded px-4 flex justify-between items-center transition-colors hover:border-[#00E5FF]">
                <span class="text-sm font-medium" 
                  [class.text-white]="formEstoque.controls.data_validade.value"
                  [class.text-[#ADAAAA]]="!formEstoque.controls.data_validade.value">
                  {{ dataValidadeFormatada() }}
                </span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
                  class="w-5 h-5 text-[#00E5FF]">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" />
                </svg>
              </div>
              <input #datePickerValidade type="date" formControlName="data_validade"
                class="absolute inset-0 opacity-0 cursor-pointer pointer-events-none">
            </div>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" formControlName="naoAplicaValidade"
                class="w-4 h-4 bg-[#131313] border border-[#484847]/80 rounded text-[#00E5FF] focus:ring-[#00E5FF] focus:ring-offset-0 focus:ring-offset-transparent">
              <span class="text-xs text-[#ADAAAA] font-medium">N/A (Não se aplica)</span>
            </label>
          </div>
        </div>

      </form>
    </div>

    <!-- Modal Footer -->
    <div class="p-6 border-t border-[#484847]/40 bg-[#131313] flex justify-end gap-3">
      <button type="button" (click)="onClose()" [disabled]="salvando"
        class="px-5 py-2.5 border border-[#484847] text-[#ADAAAA] text-[11px] font-bold uppercase tracking-wider rounded transition-colors hover:bg-[#1A1A1A] disabled:opacity-50">
        Cancelar
      </button>
      <button type="button" (click)="onSave()" [disabled]="formEstoque.invalid || salvando"
        class="px-5 py-2.5 bg-[#00E5FF] text-black text-[11px] font-bold uppercase tracking-wider rounded transition-colors hover:bg-[#00cce6] disabled:opacity-50 flex items-center gap-2 shadow-[0_0_10px_rgba(0,229,255,0.2)]">
        @if (salvando) {
        <div class="w-3.5 h-3.5 border-2 border-black/30 border-t-black rounded-full animate-spin"></div>
        Salvando...
        } @else {
        Registrar Entrada
        }
      </button>
    </div>
  </div>
</div>
}
