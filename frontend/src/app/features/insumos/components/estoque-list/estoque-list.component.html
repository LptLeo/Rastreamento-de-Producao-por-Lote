@if (carregando) {
<div class="flex justify-center items-center py-20 w-full col-span-full">
  <div class="w-8 h-8 border-4 border-[#484847] border-t-[#00E5FF] rounded-full animate-spin"></div>
</div>
} @else if (insumos.length === 0) {
<div
  class="flex flex-col justify-center items-center py-20 w-full col-span-full border border-dashed border-[#484847]/50 rounded-lg bg-[#131313]">
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#ADAAAA"
    class="w-16 h-16 mb-4">
    <path stroke-linecap="round" stroke-linejoin="round"
      d="m20.25 7.5-.625 10.632a2.25 2.25 0 0 1-2.247 2.118H6.622a2.25 2.25 0 0 1-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z" />
  </svg>
  <span class="text-[#ADAAAA] text-sm uppercase tracking-wider font-bold">Nenhum Lote em Estoque</span>
</div>
} @else {
<div class="grid grid-cols-1 md:grid-cols-2 2xl:grid-cols-3 gap-6">
  @for (item of insumos; track item.id) {
    <app-estoque-card [item]="item"></app-estoque-card>
  }
</div>
}
