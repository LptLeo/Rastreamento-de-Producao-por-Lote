@if (carregando) {
<div class="flex justify-center items-center py-20 w-full">
  <div class="w-8 h-8 border-4 border-[#484847] border-t-[#00E5FF] rounded-full animate-spin"></div>
</div>
} @else if (catalogo.length === 0) {
<div
  class="flex flex-col justify-center items-center py-20 w-full border border-dashed border-[#484847]/50 rounded-lg bg-[#131313]">
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#ADAAAA"
    class="w-16 h-16 mb-4">
    <path stroke-linecap="round" stroke-linejoin="round"
      d="m21 7.5-9-5.25L3 7.5m18 0-9 5.25m9-5.25v9l-9 5.25M3 7.5l9 5.25M3 7.5v9l9 5.25m0-9v9" />
  </svg>
  <span class="text-[#ADAAAA] text-sm uppercase tracking-wider font-bold">Nenhuma Matéria-Prima Encontrada</span>
</div>
} @else {
<div class="bg-[#131313] border border-[#484847]/30 rounded-lg overflow-hidden">
  <table class="w-full text-left">
    <thead>
      <tr class="bg-[#1A1A1A] border-b border-[#484847]/30">
        <th class="py-3 px-4 text-[10px] font-bold text-[#6B7280] uppercase tracking-wider">Nome da MP</th>
        <th class="py-3 px-4 text-[10px] font-bold text-[#6B7280] uppercase tracking-wider">SKU Interno</th>
        <th class="py-3 px-4 text-[10px] font-bold text-[#6B7280] uppercase tracking-wider">Categoria</th>
        <th class="py-3 px-4 text-[10px] font-bold text-[#6B7280] uppercase tracking-wider text-right">Unidade Medida
        </th>
      </tr>
    </thead>
    <tbody>
      @for (mp of catalogo; track mp.id) {
      <tr class="border-b border-[#1e1e1e] hover:bg-[#1a1a1a] transition-colors">
        <td class="py-4 px-4 text-[13px] font-medium text-white">{{ mp.nome }}</td>
        <td class="py-4 px-4">
          <span
            class="font-mono text-[11px] text-[#00E5FF] bg-[rgba(0,229,255,0.05)] px-2 py-0.5 rounded border border-[#00E5FF]/20">
            {{ mp.sku_interno }}
          </span>
        </td>
        <td class="py-4 px-4 text-[12px] text-[#ADAAAA]">{{ mp.categoria }}</td>
        <td class="py-4 px-4 text-right">
          <span class="text-[11px] font-bold text-[#6B7280] bg-[#1a1a1a] px-2 py-1 rounded">{{ mp.unidade_medida
            }}</span>
        </td>
      </tr>
      }
    </tbody>
  </table>
</div>
}
