<div class="min-h-screen flex flex-col justify-between bg-linear-to-b from-[#181818] via-[#0c0c0c] to-[#0c0c0c]">
  <header
    class="header-title flex justify-start items-center px-4 py-3 font-bold text-xl text-[#22D3EE] bg-[rgba(14,14,14,0.7)]">
    <img class="w-10 mr-2" src="favicon.png" alt="">
    LOTE PIM
  </header>
  <main class="flex justify-center items-center px-4">
    <form (ngSubmit)="login()" class="flex flex-col bg-[#131313] bg-opacity-70 p-5 mx-auto rounded-sm w-[340px] shadow-sm shadow-[#1b1b1b]">
      <div class="flex justify-start items-center relative mb-4">
        <h4 class="login-title font-bold text-3xl text-gray-50 p-3 pl-0">LOG IN</h4>
        <div class="login-title-line absolute border-2 rounded-full border-gray-50 w-[60px] bottom-0 left-0"></div>
      </div>
      <p class="text-sm text-gray-400 mb-10">Inicialize uma sessão segura para acessar as PÁGINAS DE CONTROLE</p>
      <label class="ps-1 text-xs text-gray-400 my-1" for="usuario">EMAIL</label>
      <input [(ngModel)]="email" name="email" class="bg-black text-sm p-3 mb-2 text-white placeholder:text-xs" type="text"
        id="usuario" placeholder="EMAIL" />
      <label class="ps-1 text-xs text-gray-400 my-1" for="senha">SENHA</label>
      <input [(ngModel)]="password" name="password" class="bg-black text-sm p-3 text-white placeholder:text-xs" type="password"
        id="senha" placeholder="SENHA" />
      <button
        class="text-xs text-center text-[#005762] bg-linear-to-r from-[#81ECFF] to-[#00E3FD] py-3 rounded-sm font-bold mt-10 shadow-sm shadow-[#81ECFF]"
        type="submit">ENTRAR</button>
    </form>
  </main>
  <footer class="flex flex-col justify-center items-center">
    <span class="text-xs text-gray-400">Versão do sistema: --x--</span>
    <span class="text-xs text-gray-400">Desenvolvido por: --x--</span>
  </footer>
</div>
