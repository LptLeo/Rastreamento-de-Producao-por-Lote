<div class="flex flex-col gap-6 text-white page-enter-safe">
  <app-page-header
    title="Gestão de Colaboradores"
    subtitle="Cadastre e gerencie o acesso dos profissionais da fábrica."
    class="animate-fade-in-up"
  >
    <div actions>
      @if (telaAtiva() === 'listagem') {
        <button
          type="button"
          (click)="abrirCadastro()"
          class="flex items-center gap-2 bg-[#00E5FF] hover:bg-[#00E5FF]/90 text-black px-6 py-2.5 rounded-lg font-bold text-xs uppercase tracking-wider transition-all"
        >
          + Cadastrar Usuário
        </button>
      } @else {
        <button
          type="button"
          (click)="voltarParaListagem()"
          class="px-5 py-2.5 border border-[#484847] text-[#ADAAAA] text-xs font-bold uppercase tracking-wider hover:bg-[#1a1a1a] hover:text-white transition-colors rounded"
        >
          Voltar para Listagem
        </button>
      }
    </div>
  </app-page-header>

  @if (erroApi()) {
    <div
      class="p-4 bg-red-950/20 border border-[#dc2626]/40 rounded-md animate-fade-in-up delay-75"
    >
      <p class="text-[#fca5a5] text-[13px] font-semibold">{{ erroApi() }}</p>
    </div>
  }

  @if (telaAtiva() === 'cadastro') {
    <app-user-form
      [salvando]="salvando()"
      [roleOptions]="roleOptions"
      (onSubmit)="salvarUsuario($event)"
      (onCancel)="voltarParaListagem()"
    ></app-user-form>
  } @else {
    <section
      class="bg-[#131313] border border-[#484847]/30 rounded-md p-6 animate-fade-in-up delay-100"
    >
      <app-user-list
        [usuarios]="cadastrados()"
        [paginationMeta]="paginationMeta()"
        [carregando]="carregandoLista()"
        [erro]="erroLista()"
        [filtroTermo]="filtroTermo()"
        [filtroPerfil]="filtroPerfil()"
        [filtroStatus]="filtroStatus()"
        [filtroPerfilOptions]="filtroPerfilOptions"
        [filtroStatusOptions]="filtroStatusOptions"
        (onRefresh)="usuariosResource.reload()"
        (onSearch)="setFiltroTermo($event)"
        (onFilterPerfil)="setFiltroPerfil($event)"
        (onFilterStatus)="setFiltroStatus($event)"
        (onPageChange)="onPageChange($event)"
        (onDeactivate)="deativarUsuario($event)"
        (onReactivate)="reativarUsuario($event)"
      ></app-user-list>
    </section>
  }
</div>
